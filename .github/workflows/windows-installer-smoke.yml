name: Windows installer smoke

on:
  push:
    branches: [main]
    paths:
      - "windows/windows-instrumentation.ps1"
      - "windows/windows-collector-instrumentation.ps1"
      - ".github/workflows/windows-installer-smoke.yml"
  pull_request:
    paths:
      - "windows/windows-instrumentation.ps1"
      - "windows/windows-collector-instrumentation.ps1"
      - ".github/workflows/windows-installer-smoke.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  collector-service:
    runs-on: windows-2022
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Parse installer with Windows PowerShell 5.1
        shell: powershell
        run: |
          $installerPath = (Resolve-Path "windows/windows-instrumentation.ps1").Path
          $installerContent = [System.IO.File]::ReadAllText($installerPath, [System.Text.Encoding]::UTF8)
          $errors = $null
          $tokens = $null
          [void][System.Management.Automation.Language.Parser]::ParseInput(
            $installerContent,
            [ref]$tokens,
            [ref]$errors
          )
          if ($errors.Count -gt 0) {
            $errors | Format-List | Out-String | Write-Error
            exit 1
          }

      - name: Install and verify Collector service
        shell: powershell
        env:
          ELVEN_AUTO_CONFIRM: "true"
          ELVEN_OTLP_ENDPOINT: "http://127.0.0.1:4318"
          ELVEN_INSTANCE_NAME: "github-windows-smoke"
          ELVEN_CUSTOMER_NAME: "elven-ci"
          ELVEN_ENVIRONMENT: "test"
        run: |
          function Invoke-ElvenInstaller {
            $global:LASTEXITCODE = 0
            & "windows/windows-collector-instrumentation.ps1"
            if ($global:LASTEXITCODE -ne 0) {
              throw "Installer exited with code $global:LASTEXITCODE"
            }
          }

          $storageDirectory = "C:\ProgramData\OpenTelemetry Collector\file_storage"
          $currentQueuePath = Join-Path $storageDirectory "exporter_otlp_http_collector_metrics"
          $legacyQueuePath = Join-Path $storageDirectory "exporter_otlphttp_collector_metrics"

          # First install creates a real Collector persistent queue.
          Invoke-ElvenInstaller
          for ($attempt = 1; $attempt -le 30 -and -not (Test-Path -LiteralPath $currentQueuePath); $attempt++) {
            Start-Sleep -Seconds 2
          }
          if (-not (Test-Path -LiteralPath $currentQueuePath)) {
            throw "The first installation did not create the persistent queue."
          }

          Stop-Service -Name "otelcol" -Force -ErrorAction Stop
          (Get-Service -Name "otelcol").WaitForStatus("Stopped", [TimeSpan]::FromSeconds(30))
          Move-Item -LiteralPath $currentQueuePath -Destination $legacyQueuePath -ErrorAction Stop

          # Reproduce the customer state: an old queue that explicitly denies SYSTEM.
          & icacls.exe $legacyQueuePath /inheritance:r /deny '*S-1-5-18:(F)' /Q
          if ($LASTEXITCODE -ne 0) {
            throw "Could not seed the stale queue ACL regression fixture."
          }

          # The second install must repair ACLs, migrate the real queue, and start.
          Invoke-ElvenInstaller

          Start-Sleep -Seconds 10
          $collector = Get-Service -Name "otelcol" -ErrorAction Stop
          $exporter = Get-Service -Name "windows_exporter" -ErrorAction Stop
          if ($collector.Status -ne "Running" -or $exporter.Status -ne "Running") {
            throw "Services are not running: otelcol=$($collector.Status), windows_exporter=$($exporter.Status)"
          }

          if ((Test-Path -LiteralPath $legacyQueuePath) -or -not (Test-Path -LiteralPath $currentQueuePath)) {
            throw "The real legacy persistent queue was not preserved and migrated."
          }

          $eventSourcePath = "HKLM:\SYSTEM\CurrentControlSet\Services\EventLog\Application\otelcol"
          $eventSource = Get-ItemProperty -Path $eventSourcePath -Name "EventMessageFile" -ErrorAction Stop
          $resolvedEventMessageFile = [Environment]::ExpandEnvironmentVariables($eventSource.EventMessageFile)
          $expectedEventMessageFile = Join-Path $env:SystemRoot "System32\EventCreate.exe"
          if (-not $resolvedEventMessageFile.Equals($expectedEventMessageFile, [StringComparison]::OrdinalIgnoreCase)) {
            throw "Unexpected EventMessageFile: $($eventSource.EventMessageFile)"
          }

          & "C:\Program Files\OpenTelemetry Collector\otelcol-contrib.exe" validate `
            "--config=file:C:/Program Files/OpenTelemetry Collector/config.yaml"
          if ($LASTEXITCODE -ne 0) {
            throw "Collector configuration validation failed with code $LASTEXITCODE"
          }
